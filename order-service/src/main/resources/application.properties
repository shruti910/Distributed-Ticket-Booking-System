spring.application.name=order-service
server.port=8082
server.servlet.context-path=/order-ms

# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html
# /api-docs endpoint custom path
springdoc.api-docs.path=/v1/api-docs
# To enable/disable YAML format
springdoc.api-docs.enabled=true

#Flyway settings
spring.flyway.enabled=true
# Since we use Docker, we ensure Flyway waits for the DB to be ready
spring.flyway.baseline-on-migrate=true
# Hibernate settings (CRITICAL)
# Set this to 'validate' or 'none' so Hibernate doesn't create DDL statements on its own
spring.jpa.hibernate.ddl-auto=none
# This tells Hibernate to use the exact names defined in your @Table annotations or Flyway
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# This prevents Hibernate from trying to turn everything into snake_case/lowercase
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

#---connect to mysql---#
spring.datasource.url               =${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/ORDER_MANAGEMENT?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username          =${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password          =${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# Logging
logging.file.name=${LOGGING_FILE_NAME:logs/order-ms.log}
# Roll the log file every 10MB so it doesn't get too huge
logging.logback.rollingpolicy.max-file-size=10MB
# Keep only the last 7 days of logs
logging.logback.rollingpolicy.max-history=7
# Set specific levels for your packages
logging.level.com.tech.ticketbolt.orderservice=DEBUG
logging.level.org.springframework.web=INFO

#Kafka
spring.kafka.bootstrap-servers =${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.template.default-topic = order
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

#custom values
order.payment.status=${ORDER_PAYMENT_STATUS:confirmed}



