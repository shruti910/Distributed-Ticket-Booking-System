spring.application.name=inventory-service
server.servlet.context-path=/inventory-ms
server.port=8080
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html
# /api-docs endpoint custom path
springdoc.api-docs.path=/v1/api-docs
# To enable/disable YAML format
springdoc.api-docs.enabled=true
#actuator setting
management.endpoints.web.exposure.include=*
# Flyway settings
spring.flyway.enabled=true
# Since we use Docker, we ensure Flyway waits for the DB to be ready
spring.flyway.baseline-on-migrate=true
# Hibernate settings (CRITICAL)
# Set this to 'validate' or 'none' so Hibernate doesn't create DDL statements on its own
spring.jpa.hibernate.ddl-auto=none
# This tells Hibernate to use the exact names defined in your @Table annotations or Flyway
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# This prevents Hibernate from trying to turn everything into snake_case/lowercase
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
#---connect to mysql---#
spring.datasource.url=jdbc:mysql://localhost:3306/INVENTORY_MANAGEMENT?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Logging
logging.file.name=logs/inventory-ms.log
# Roll the log file every 10MB so it doesn't get too huge
logging.logback.rollingpolicy.max-file-size=10MB
# Keep only the last 7 days of logs
logging.logback.rollingpolicy.max-history=7
# Set specific levels for your packages
logging.level.com.tech.ticketbolt.inventoryservice=DEBUG
logging.level.org.springframework.web=INFO

#Kafka
spring.kafka.bootstrap-servers = localhost:9092
spring.kafka.template.default-topic = order
spring.kafka.consumer.group-id=inventory-service
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer


