services:
  db:
    image: mysql:latest
    container_name: mysqlcontainer3
    restart : always
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ORDER_MANAGEMENT
    volumes:
      # Initial data setup (The "Docker Way")
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persistent data (Named volume)
      - db-data:/var/lib/mysql
      - db-data:/var/log/mysql

volumes:
  db-data:  # This tells Docker to manage a persistent storage area