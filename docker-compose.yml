services:
  # =========================================================================
  # 1.  INFRASTRUCTURE: MESSAGING & REGISTRY
  # =========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 3000

  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 29092 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8084:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://kafka-schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: 'true'

  kafka-schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: kafka-schema-registry
    container_name: kafka-schema-registry
    depends_on:
      - kafka-broker
    ports:
      - "8083:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: kafka-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-broker:29092"
      SCHEMA_REGISTRY_LISTENERS: http://kafka-schema-registry:8081

  # =========================================================================
  # 2.  INFRASTRUCTURE: ISOLATED DATABASES
  # =========================================================================
  booking-db:
    image: mysql:latest
    container_name: mysqlcontainer2
    restart: always
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=BOOKING_MANAGEMENT
    volumes:
      - ./booking-service/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - booking-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-db:
    image: mysql:latest
    container_name: mysqlcontainer
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=INVENTORY_MANAGEMENT
    volumes:
      - ./inventory-service/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: mysql:latest
    container_name: mysqlcontainer3
    restart: always
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ORDER_MANAGEMENT
    volumes:
      - ./order-service/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - order-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================================================================
  # 3. TICKETBOLT APPLICATION SERVICES (AUTOMATED MULTI-STAGE BUILDS)
  # =========================================================================
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: ticketbolt-booking-ms
    ports:
      - "8081:8081"
    depends_on:
      booking-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    environment:
      - JAVA_TOOL_OPTIONS=-Dspring.profiles.active=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://booking-db:3306/BOOKING_MANAGEMENT?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092
      - INVENTORY_SERVICE_URL=http://ticketbolt-inventory-ms:8080/inventory-ms/api/v1/inventory/reserve

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: ticketbolt-inventory-ms
    ports:
      - "8080:8080"
    depends_on:
      inventory-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    environment:
      - JAVA_TOOL_OPTIONS=-Dspring.profiles.active=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://inventory-db:3306/INVENTORY_MANAGEMENT?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: ticketbolt-order-ms
    ports:
      - "8082:8082"
    depends_on:
      order-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    environment:
      - JAVA_TOOL_OPTIONS=-Dspring.profiles.active=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://order-db:3306/ORDER_MANAGEMENT?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-broker:29092

volumes:
  booking-db-data:
  inventory-db-data:
  order-db-data: